version: '3.8'

services:
  agimus-spacelab:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: agimus-spacelab:latest
    container_name: agimus_spacelab_dev
    hostname: agimus-dev
    
    # Mount the source code
    volumes:
      - ..:/workspace/agimus_spacelab
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Network mode
    network_mode: host
    
    # Environment variables
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PYTHONPATH=/workspace/agimus_spacelab/src
    
    # For GUI applications
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    
    # Working directory
    working_dir: /workspace/agimus_spacelab
