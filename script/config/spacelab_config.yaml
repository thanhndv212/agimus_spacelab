# SpaceLab task configuration (YAML)
# UR10 + VISPA composite robot manipulation on the SpaceLab testbed.
#
# Consumed by: YamlTaskLoader (src/agimus_spacelab/config/yaml_loader.py)
# Test script:  script/spacelab/test_spacelab_yaml.py

task: spacelab

# ---------------------------------------------------------------------------
# File paths (used by SceneBuilder)
# ---------------------------------------------------------------------------
paths:
  robot:
    spacelab:
      urdf: "package://spacelab_mock_hardware/description/urdf/allRobots_spacelab_robot.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/allRobots_spacelab_robot.srdf"

  environment:
    ground_demo: "package://spacelab_mock_hardware/description/urdf/ground_demo.urdf"

  objects:
    frame_gripper:
      urdf: "package://spacelab_mock_hardware/description/urdf/frame_gripper.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/frame_gripper.srdf"
    screw_driver:
      urdf: "package://spacelab_mock_hardware/description/urdf/screw_driver.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/screw_driver.srdf"
    RS1:
      urdf: "package://spacelab_mock_hardware/description/urdf/RS1.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/RS1.srdf"
    RS2:
      urdf: "package://spacelab_mock_hardware/description/urdf/RS2.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/RS2.srdf"
    RS3:
      urdf: "package://spacelab_mock_hardware/description/urdf/RS3.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/RS3.srdf"
    RS4:
      urdf: "package://spacelab_mock_hardware/description/urdf/RS4.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/RS4.srdf"
    RS5:
      urdf: "package://spacelab_mock_hardware/description/urdf/RS5.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/RS5.srdf"
    RS6:
      urdf: "package://spacelab_mock_hardware/description/urdf/RS6.urdf"
      srdf: "package://spacelab_mock_hardware/description/srdf/RS6.srdf"

# ---------------------------------------------------------------------------
# Scene selection
# ---------------------------------------------------------------------------
robots:
  - spacelab

environments:
  - ground_demo

# ---------------------------------------------------------------------------
# Robot joint groups
# Each entry: {joint: <name>, initial: <rad>, bounds: [lo, hi]}
# ---------------------------------------------------------------------------
joint_groups:
  UR10:
    - {joint: spacelab/ur10_joint_1_2, initial: 0.0, bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/ur10_joint_2_3, initial: 0.0, bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/ur10_joint_3_4, initial: -2.8, bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/ur10_joint_4_5, initial: 1.57, bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/ur10_joint_5_6, initial: 0.0, bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/ur10_joint_6_7, initial: 0.0, bounds: [-3.14159, 3.14159]}

  VISPA_BASE:
    - {joint: spacelab/vispa2_joint_2_3,           initial: 0.0, bounds: [-5.0, 5.0]}
    - {joint: spacelab/vispa2_joint_3_eeWorkbench,  initial: 0.0, bounds: [-5.0, 5.0]}

  VISPA_ARM:
    - {joint: spacelab/vispa_joint_1_2, initial: 0.0,  bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/vispa_joint_2_3, initial: 3.14, bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/vispa_joint_3_4, initial: 2.8,  bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/vispa_joint_4_5, initial: 1.57,  bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/vispa_joint_5_6, initial: 0.0,  bounds: [-3.14159, 3.14159]}
    - {joint: spacelab/vispa_joint_6_7, initial: 0.0,  bounds: [-3.14159, 3.14159]}

# ---------------------------------------------------------------------------
# Freeflyer bounds applied to every object root joint
# translation: [[xmin,xmax], [ymin,ymax], [zmin,zmax]]
# quaternion:  [[qxmin,qxmax], ...]
# ---------------------------------------------------------------------------
freeflyer_bounds:
  translation: [[-2.0, 2.0], [-3.0, 3.0], [-2.0, 2.0]]
  quaternion:  [[-1.0001, 1.0001], [-1.0001, 1.0001],
                [-1.0001, 1.0001], [-1.0001, 1.0001]]

# ---------------------------------------------------------------------------
# Arm groups — maps gripper frame names to their arm's joint keyword.
# joint_keyword: substring used by freeze_joints_by_substrings() to lock
#   all joints belonging to that arm.
# grippers: list of full gripper frame names belonging to the arm.
# Used by GraspSequencePlanner auto-freeze (frozen_arms_mode="auto").
# ---------------------------------------------------------------------------
arm_groups:
  ur10:
    joint_keyword: "ur10"
    grippers:
      - spacelab/g_ur10_tool
      - frame_gripper/g_FG_part  # Frame Gripper is carried by the UR10
  vispa_arm:
    joint_keyword: "vispa_"
    grippers:
      - spacelab/g_vispa_tool
      - screw_driver/g_SD_part   # Screw Driver is carried by the VISPA arm
  vispa2:
    joint_keyword: "vispa2"
    grippers:
      - spacelab/g_vispa2_wb1
      - spacelab/g_vispa2_wb2
      - spacelab/g_vispa2_wb3
      - spacelab/g_vispa2_wb4
      - spacelab/g_vispa2_wb5
      - spacelab/g_vispa2_wb6

# ---------------------------------------------------------------------------
# Objects
# initial_pose_xyzrpy: [x, y, z, roll, pitch, yaw]  (converted to xyzquat)
# initial_pose_xyzquat: [x, y, z, qx, qy, qz, qw]  (used directly)
# ---------------------------------------------------------------------------
objects:
  frame_gripper:
    initial_pose_xyzrpy: [-0.13349999871947557, 1.3322770029736009, -1.2132999986768855,
                           -5.098912860707481e-09, -3.1415923241839976, 1.5707963267958001]
