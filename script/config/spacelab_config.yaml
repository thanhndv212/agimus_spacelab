  spacelab/g_vispa2_wb2:
    - RS2/h_RS2_WB
  spacelab/g_vispa2_wb3:
    - RS3/h_RS3_WB
  spacelab/g_vispa2_wb4:
    - RS4/h_RS4_WB
  spacelab/g_vispa2_wb5:
    - RS5/h_RS5_WB
  spacelab/g_vispa2_wb6:
    - RS6/h_RS6_WB
  frame_gripper/g_FG_part:
    - RS1/h_RS1_FG
    - RS2/h_RS2_FG
    - RS3/h_RS3_FG
    - RS4/h_RS4_FG
    - RS5/h_RS5_FG
    - RS6/h_RS6_FG
  screw_driver/g_SD_part:
    - RS1/h_RS1_CON0
    - RS1/h_RS1_CON1
    - RS1/h_RS1_CON2
    - RS1/h_RS1_CON3
    - RS2/h_RS2_CON0
    - RS2/h_RS2_CON1
    - RS2/h_RS2_CON2
    - RS2/h_RS2_CON3
    - RS3/h_RS3_CON0
    - RS3/h_RS3_CON1
    - RS3/h_RS3_CON2
    - RS3/h_RS3_CON3
    - RS4/h_RS4_CON0
    - RS4/h_RS4_CON1
    - RS4/h_RS4_CON2
