                           1.5707938223931903, -3.1415918612707121, 2.0943948257717535]
    handles:
      - RS3/h_RS3_FG
      - RS3/h_RS3_WB
      - RS3/h_RS3_CON0
      - RS3/h_RS3_CON1
      - RS3/h_RS3_CON2
      - RS3/h_RS3_CON3
    contact_surfaces: []

  RS4:
    initial_pose_xyzrpy: [0.38432000027622287, 2.0134709992570583, -0.99423100120426089,
                           1.4828606077991944, -2.9906356348103711, 2.1010496873808218]
    handles:
      - RS4/h_RS4_FG
      - RS4/h_RS4_WB
      - RS4/h_RS4_CON0
      - RS4/h_RS4_CON1
      - RS4/h_RS4_CON2
      - RS4/h_RS4_CON3
    contact_surfaces: []

  RS5:
    initial_pose_xyzrpy: [-0.46567999967380558, 2.0133499991226964, -0.99421000142184635,
                            1.4828606077991944, -2.9906356348103711, 2.1010496873808218]
    handles:
      - RS5/h_RS5_FG
      - RS5/h_RS5_WB
      - RS5/h_RS5_CON0
      - RS5/h_RS5_CON1
      - RS5/h_RS5_CON2
      - RS5/h_RS5_CON3
    contact_surfaces: []

  RS6:
    initial_pose_xyzrpy: [-0.46567999999999987, 2.0219489999999993, -0.63200800000000001,
                            1.5707938223931903, -3.1415918612707121, 2.0943948257717535]
    handles:
