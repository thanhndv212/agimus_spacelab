    - RS6/h_RS6_CON1
    - RS6/h_RS6_CON2
    - RS6/h_RS6_CON3

# ---------------------------------------------------------------------------
# Environment contact surfaces (used by factory graph for placement)
# ---------------------------------------------------------------------------
environment_contacts:
  ground_demo:
    - ground_demo/ground_surface

# ---------------------------------------------------------------------------
# Planning defaults
# ---------------------------------------------------------------------------
planning:
  validation_step: 0.01
  projector_step: 0.1
  max_iterations: 1000
  max_random_attempts: 1000
